<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Zyn Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #041413;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #e2f5f3;
    }

    /* ── Welcome screen ───────────────────────────────────── */
    #welcome {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #041413;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(0, 201, 167, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 15%, rgba(0, 149, 182, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 90%, rgba(0, 201, 167, 0.06) 0%, transparent 45%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    #welcome-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      padding: 36px 28px;
      background: rgba(0, 201, 167, 0.04);
      border: 1px solid rgba(0, 201, 167, 0.15);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(0, 201, 167, 0.08);
    }

    #welcome-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, rgba(0, 201, 167, 0.2), rgba(0, 149, 182, 0.15));
      border-radius: 22px;
      border: 1px solid rgba(0, 201, 167, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 201, 167, 0.15); }
      50%       { box-shadow: 0 0 40px rgba(0, 201, 167, 0.35); }
    }

    #welcome-card h1 {
      font-size: 30px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: linear-gradient(135deg, #00c9a7 0%, #7fffd4 60%, #00b4d8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .version-badge {
      background: rgba(0, 201, 167, 0.08);
      border: 1px solid rgba(0, 201, 167, 0.2);
      color: rgba(0, 201, 167, 0.5);
      font-size: 11px;
      font-family: 'Courier New', monospace;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: -8px;
      letter-spacing: 0.06em;
    }

    #welcome-card p {
      font-size: 15px;
      color: rgba(226, 245, 243, 0.45);
      line-height: 1.6;
    }

    .api-key-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 6px;
      text-align: left;
    }

    .api-key-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0, 201, 167, 0.6);
    }

    #api-key-input {
      width: 100%;
      background: rgba(0, 201, 167, 0.05);
      border: 1px solid rgba(0, 201, 167, 0.2);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
      color: #e2f5f3;
      outline: none;
      letter-spacing: 0.04em;
      -webkit-appearance: none;
    }
    #api-key-input::placeholder { color: rgba(226, 245, 243, 0.2); }
    #api-key-input:focus {
      border-color: rgba(0, 201, 167, 0.5);
      background: rgba(0, 201, 167, 0.08);
    }

    #api-key-error {
      font-size: 12px;
      color: #f87171;
      display: none;
    }

    #start-btn {
      margin-top: 8px;
      width: 100%;
      background: linear-gradient(135deg, #00c9a7 0%, #0097b2 100%);
      box-shadow: 0 4px 24px rgba(0, 201, 167, 0.4);
      color: #041413;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #start-btn:active {
      background: linear-gradient(135deg, #00a896 0%, #0082a0 100%);
      box-shadow: 0 2px 10px rgba(0, 201, 167, 0.25);
    }

    /* ── Scanner UI ───────────────────────────────────────── */
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #status-banner {
      width: 100%;
      background: linear-gradient(180deg, rgba(4,20,19,0.85) 0%, rgba(4,20,19,0.55) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0, 201, 167, 0.12);
      padding: 12px 16px 10px;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    #status-banner-inner {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #app-label {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #00c9a7;
      flex-shrink: 0;
    }

    #status {
      font-size: 13px;
      font-weight: 500;
      color: rgba(226, 245, 243, 0.7);
    }

    #detected-text {
      font-size: 10px;
      color: rgba(0, 201, 167, 0.4);
      margin-top: 5px;
      min-height: 14px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
    }

    #reticle {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #reticle svg {
      width: min(65vw, 65vh);
      height: min(65vw, 65vh);
      filter: drop-shadow(0 0 8px rgba(0, 201, 167, 0.6));
    }

    #scan-line {
      position: absolute;
      width: min(65vw, 65vh);
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #00c9a7 30%, #7fffd4 50%, #00c9a7 70%, transparent 100%);
      filter: blur(1px);
      box-shadow: 0 0 10px rgba(0, 201, 167, 0.7);
      animation: scanLine 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes scanLine {
      0%   { transform: translateY(calc(-0.5 * min(65vw, 65vh))); opacity: 0; }
      8%   { opacity: 0.85; }
      92%  { opacity: 0.85; }
      100% { transform: translateY(calc(0.5 * min(65vw, 65vh))); opacity: 0; }
    }

    /* ── Bottom panel ─────────────────────────────────────── */
    #panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      background: rgba(4, 20, 18, 0.94);
      border-top: 1px solid rgba(0, 201, 167, 0.2);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      max-height: 45vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: rgba(0, 201, 167, 0.03);
      border-bottom: 1px solid rgba(0, 201, 167, 0.08);
      flex-shrink: 0;
    }

    #count {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(0, 201, 167, 0.5);
    }

    #copy-btn {
      background: linear-gradient(135deg, #00c9a7, #0097b2);
      box-shadow: 0 2px 10px rgba(0, 201, 167, 0.35);
      color: #041413;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #copy-btn:active {
      background: linear-gradient(135deg, #00a896, #0082a0);
      box-shadow: none;
    }
    #copy-btn:disabled {
      background: rgba(255, 255, 255, 0.07);
      box-shadow: none;
      color: rgba(255, 255, 255, 0.2);
      cursor: default;
    }

    #code-list-wrap {
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    #code-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #code-list li {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(0, 201, 167, 0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #code-list li:first-child {
      background: rgba(0, 201, 167, 0.07);
      border-left: 3px solid rgba(0, 201, 167, 0.5);
    }

    .code-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    /* Character-by-character inputs */
    .char-inputs {
      display: flex;
      gap: 1px;
    }

    .char-input {
      width: 19px;
      height: 28px;
      text-align: center;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid rgba(0, 201, 167, 0.2);
      color: #b2ede5;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      letter-spacing: 0;
      caret-color: #00c9a7;
      outline: none;
      padding: 0;
      -webkit-appearance: none;
      border-radius: 0;
    }

    #code-list li:first-child .char-input { color: #5ff0d5; }

    .char-input:focus {
      border-bottom-color: #00c9a7;
      background: rgba(0, 201, 167, 0.1);
      border-radius: 3px 3px 0 0;
      color: #e2f5f3;
    }

    /* ── Status indicator ─────────────────────────────────── */
    .status-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .status-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 201, 167, 0.2);
      border-top-color: #00c9a7;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status-success {
      font-size: 16px;
      color: #4ade80;
      line-height: 1;
    }

    .status-failure {
      font-size: 16px;
      color: #f87171;
      line-height: 1;
    }

    .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.18);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 0 4px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { color: #f87171; }

    #empty-msg {
      padding: 16px;
      font-size: 13px;
      color: rgba(0, 201, 167, 0.25);
      text-align: center;
      letter-spacing: 0.02em;
    }
  </style>
</head>
<body>

  <!-- Welcome screen -->
  <div id="welcome">
    <div id="welcome-card">
      <div id="welcome-icon">
        <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
          <!-- Outer ring -->
          <circle cx="20" cy="20" r="17" stroke="#00c9a7" stroke-width="1.5"/>
          <!-- Z mark -->
          <path d="M13 13.5 H27 L13 26.5 H27" stroke="#00c9a7" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <h1>Zyn Scanner</h1>
      <span class="version-badge">v0.09</span>
      <p>Scan Zyn reward codes with your camera. Codes are captured and submitted automatically.</p>
      <div class="api-key-wrap">
        <label class="api-key-label" for="api-key-input">API Key</label>
        <input id="api-key-input" type="password" placeholder="Paste your API key" autocomplete="off" spellcheck="false">
        <span id="api-key-error">Please enter your API key to continue.</span>
      </div>
      <button id="start-btn">Start Scanning</button>
    </div>
  </div>

  <!-- Scanner UI -->
  <video id="video" autoplay muted playsinline></video>

  <div id="overlay">
    <div id="status-banner">
      <div id="status-banner-inner">
        <span id="app-label">Zyn</span>
        <span id="status">Starting…</span>
      </div>
      <div id="detected-text"></div>
    </div>
    <div id="reticle">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="bracket-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g filter="url(#bracket-glow)">
          <path d="M20 60 L20 20 L60 20"      stroke="#00c9a7" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M140 20 L180 20 L180 60"   stroke="#00c9a7" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M180 140 L180 180 L140 180" stroke="#00c9a7" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M60 180 L20 180 L20 140"   stroke="#00c9a7" stroke-width="3.5" stroke-linecap="round"/>
        </g>
        <line x1="97" y1="100" x2="103" y2="100" stroke="rgba(0,201,167,0.4)" stroke-width="2" stroke-linecap="round"/>
        <line x1="100" y1="97"  x2="100" y2="103" stroke="rgba(0,201,167,0.4)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div id="scan-line"></div>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <span id="count">Scanned Codes (0)</span>
      <button id="copy-btn" disabled>Copy All</button>
    </div>
    <div id="code-list-wrap">
      <p id="empty-msg">No reward codes scanned yet</p>
      <ul id="code-list"></ul>
    </div>
  </div>

  <script>
    const VERSION = '0.08';
    const API_BASE = 'https://zzbqzv2zi8.execute-api.us-east-2.amazonaws.com/Omega';

    const video      = document.getElementById('video');
    const statusEl   = document.getElementById('status');
    const detectedEl = document.getElementById('detected-text');
    const codeList   = document.getElementById('code-list');
    const countEl    = document.getElementById('count');
    const copyBtn    = document.getElementById('copy-btn');
    const emptyMsg   = document.getElementById('empty-msg');

    // Map<upperCaseKey, { confidence, display, li, inputs, statusIcon, currentKey }>
    const codes = new Map();
    let scanning = false;
    let apiKey   = '';

    // ── Welcome screen ──────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
      const keyInput = document.getElementById('api-key-input');
      const keyError = document.getElementById('api-key-error');
      const val = keyInput.value.trim();
      if (!val) {
        keyError.style.display = 'block';
        keyInput.focus();
        return;
      }
      keyError.style.display = 'none';
      apiKey = val;
      document.getElementById('welcome').style.display = 'none';
      start();
    });

    document.getElementById('api-key-input').addEventListener('input', () => {
      document.getElementById('api-key-error').style.display = 'none';
    });

    // ── Helpers ─────────────────────────────────────────────
    function hammingDistance(a, b) {
      let d = 0;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
      return d;
    }

    // ── API submission ───────────────────────────────────────
    async function submitCode(key, entry) {
      setStatus(entry, 'pending');
      try {
        const res = await fetch(API_BASE, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'x-api-key': apiKey,
          },
          body: JSON.stringify({ code: key }),
        });
        setStatus(entry, res.ok ? 'success' : 'failure');
      } catch (_) {
        setStatus(entry, 'failure');
      }
    }

    function setStatus(entry, state) {
      entry.status = state;
      const icon = entry.statusIcon;
      icon.innerHTML = '';
      if (state === 'pending') {
        const spinner = document.createElement('div');
        spinner.className = 'status-spinner';
        icon.appendChild(spinner);
      } else if (state === 'success') {
        const check = document.createElement('span');
        check.className = 'status-success';
        check.textContent = '✓';
        icon.appendChild(check);
      } else {
        const x = document.createElement('span');
        x.className = 'status-failure';
        x.textContent = '✕';
        icon.appendChild(x);
      }
    }

    // ── Camera + OCR init ────────────────────────────────────
    async function start() {
      statusEl.textContent = 'Loading OCR…';

      let worker;
      try {
        worker = await Tesseract.createWorker('eng');
        await worker.setParameters({
          tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789',
          tessedit_pageseg_mode: '11',
        });
      } catch (e) {
        statusEl.textContent = 'Failed to load OCR: ' + e.message;
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        await video.play();
      } catch (e) {
        statusEl.textContent = 'Camera error: ' + e.message;
        return;
      }

      statusEl.textContent = 'Ready — point at a reward code';
      startScanLoop(worker);
    }

    // ── Scan loop ────────────────────────────────────────────
    function startScanLoop(worker) {
      const canvas = document.createElement('canvas');
      const ctx    = canvas.getContext('2d');
      const codeRe = /\b[A-Za-z0-9]{10,11}\b/g;

      setInterval(async () => {
        if (scanning || video.readyState < 4) return;
        scanning = true;
        statusEl.textContent = 'Scanning…';

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        try {
          const { data } = await worker.recognize(canvas);

          const trimmed = (data.text || '').replace(/\s+/g, ' ').trim();
          detectedEl.textContent = trimmed
            ? 'Detected: ' + (trimmed.length > 80 ? trimmed.slice(0, 80) + '…' : trimmed)
            : '';

          // Per-word confidence lookup (fallback)
          const wordConf = new Map();
          for (const word of (data.words || [])) {
            const t = word.text.trim().toUpperCase();
            if (t) wordConf.set(t, word.confidence);
          }

          // Symbol-level confidence: average over matched characters
          const symbols      = data.symbols || [];
          const symbolText   = symbols.map(s => s.text).join('');
          const symbolTextUp = symbolText.toUpperCase();

          function symbolConfFor(raw) {
            const idx = symbolTextUp.indexOf(raw.toUpperCase());
            if (idx < 0) return null;
            const slice = symbols.slice(idx, idx + raw.length);
            return slice.reduce((sum, s) => sum + s.confidence, 0) / slice.length;
          }

          const matches = [...new Set((data.text || '').match(codeRe) || [])];
          for (const raw of matches) {
            if (/[A-Za-z]/.test(raw) && /[0-9]/.test(raw)) {
              const confidence = symbolConfFor(raw)
                ?? wordConf.get(raw.toUpperCase())
                ?? data.confidence
                ?? 50;
              processCode(raw, confidence);
            }
          }
        } catch (_) {}

        statusEl.textContent = 'Ready — point at a reward code';
        scanning = false;
      }, 1000);
    }

    // ── Confidence-aware dedup ───────────────────────────────
    function processCode(raw, confidence) {
      const key = raw.toUpperCase();

      // Exact match: update display if higher confidence, no re-submit
      if (codes.has(key)) {
        const entry = codes.get(key);
        if (confidence > entry.confidence) {
          entry.confidence = confidence;
          entry.display    = raw;
          for (let i = 0; i < raw.length; i++) entry.inputs[i].value = raw[i];
        }
        return;
      }

      // Near-duplicate (hamming ≤ 1): replace + re-submit only if higher confidence
      for (const [existingKey, entry] of codes) {
        if (hammingDistance(key, existingKey) <= 1) {
          if (confidence > entry.confidence) {
            codes.delete(existingKey);
            entry.li.remove();
            addCodeToList(raw, confidence);
          }
          return;
        }
      }

      addCodeToList(raw, confidence);
    }

    // ── Sync edited code back to the Map ────────────────────
    function syncCode(entry) {
      const newRaw = entry.inputs.map(i => i.value).join('');
      if (newRaw.length !== entry.inputs.length) return;
      const newKey = newRaw.toUpperCase();
      if (newKey !== entry.currentKey) {
        codes.delete(entry.currentKey);
        entry.currentKey = newKey;
        entry.display    = newRaw;
        codes.set(newKey, entry);
      }
    }

    // ── DOM ──────────────────────────────────────────────────
    function addCodeToList(raw, confidence) {
      const key = raw.toUpperCase();
      emptyMsg.style.display = 'none';

      const li = document.createElement('li');

      const left = document.createElement('div');
      left.className = 'code-left';

      // 10 individual character inputs
      const charWrap = document.createElement('div');
      charWrap.className = 'char-inputs';

      const inputs = [];
      const statusIcon = document.createElement('div');
      statusIcon.className = 'status-icon';

      const entry = { confidence, display: raw, li, inputs, statusIcon, currentKey: key, status: 'pending' };

      for (let i = 0; i < raw.length; i++) {
        const inp = document.createElement('input');
        inp.type      = 'text';
        inp.maxLength = 1;
        inp.value     = raw[i];
        inp.className = 'char-input';
        inp.setAttribute('autocomplete',   'off');
        inp.setAttribute('autocorrect',    'off');
        inp.setAttribute('autocapitalize', 'characters');
        inp.setAttribute('spellcheck',     'false');
        inp.setAttribute('inputmode',      'text');

        inp.addEventListener('focus', () => inp.select());

        inp.addEventListener('input', () => {
          inp.value = inp.value.replace(/[^A-Za-z0-9]/g, '').slice(0, 1);
          if (inp.value && i < inputs.length - 1) inputs[i + 1].focus();
          syncCode(entry);
        });

        inp.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && inp.value === '' && i > 0) {
            inputs[i - 1].value = '';
            inputs[i - 1].focus();
            syncCode(entry);
          } else if (e.key === 'ArrowLeft'  && i > 0)                inputs[i - 1].focus();
          else if   (e.key === 'ArrowRight' && i < inputs.length - 1) inputs[i + 1].focus();
        });

        charWrap.appendChild(inp);
        inputs.push(inp);
      }

      left.appendChild(charWrap);
      left.appendChild(statusIcon);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '×';
      delBtn.setAttribute('aria-label', 'Remove code');
      delBtn.addEventListener('click', () => {
        codes.delete(entry.currentKey);
        li.remove();
        countEl.textContent = `Reward Codes (${codes.size})`;
        if (!codes.size) { emptyMsg.style.display = ''; copyBtn.disabled = true; emptyMsg.textContent = 'No reward codes scanned yet'; }
      });

      li.appendChild(left);
      li.appendChild(delBtn);
      codeList.prepend(li);

      codes.set(key, entry);
      countEl.textContent = `Reward Codes (${codes.size})`;
      copyBtn.disabled = false;

      submitCode(raw, entry);
    }

    // Copy uses current display value (reflects edits)
    copyBtn.addEventListener('click', async () => {
      if (!codes.size) return;
      try {
        await navigator.clipboard.writeText([...codes.values()].map(e => e.display).join('\n'));
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy All'; }, 1500);
      } catch (e) {
        copyBtn.textContent = 'Failed';
        setTimeout(() => { copyBtn.textContent = 'Copy All'; }, 1500);
      }
    });
  </script>
</body>
</html>

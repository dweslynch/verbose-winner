<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Code Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0f172a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Welcome screen ───────────────────────────────────── */
    #welcome {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #0f172a;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    #welcome-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 320px;
      width: 100%;
      text-align: center;
    }

    #welcome-icon {
      width: 72px;
      height: 72px;
      background: rgba(37, 99, 235, 0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #welcome-card h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.5px;
    }

    .version-badge {
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.4);
      font-size: 12px;
      font-family: 'Courier New', monospace;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: -8px;
    }

    #welcome-card p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.5);
      line-height: 1.5;
    }

    #start-btn {
      margin-top: 8px;
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #start-btn:active { background: #1d4ed8; }

    /* ── Scanner UI ───────────────────────────────────────── */
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #status-banner {
      width: 100%;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      padding: 12px 16px 8px;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    #status {
      font-size: 14px;
      font-weight: 600;
    }

    #detected-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
      margin-top: 4px;
      min-height: 16px;
      word-break: break-all;
    }

    #reticle {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #reticle svg {
      width: min(65vw, 65vh);
      height: min(65vw, 65vh);
    }

    /* ── Bottom panel ─────────────────────────────────────── */
    #panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      background: rgba(0, 0, 0, 0.88);
      color: #fff;
      max-height: 45vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.12);
      flex-shrink: 0;
    }

    #count {
      font-size: 13px;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.8);
    }

    #copy-btn {
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    #copy-btn:active { background: #1d4ed8; }
    #copy-btn:disabled { background: #374151; cursor: default; }

    #code-list-wrap {
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    #code-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #code-list li {
      padding: 9px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #code-list li:first-child .code-text { color: #60a5fa; }

    .code-left {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .code-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      letter-spacing: 0.05em;
    }

    .conf-badge {
      font-size: 10px;
      font-family: 'Courier New', monospace;
      opacity: 0.85;
      flex-shrink: 0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.3);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 0 4px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { color: #f87171; }

    #empty-msg {
      padding: 14px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.35);
      text-align: center;
    }
  </style>
</head>
<body>

  <!-- Welcome screen -->
  <div id="welcome">
    <div id="welcome-card">
      <div id="welcome-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h1>Code Scanner</h1>
      <span class="version-badge">v0.03</span>
      <p>Point your camera at text containing a 10-character alphanumeric code. Codes are captured automatically.</p>
      <button id="start-btn">Start Scanning</button>
    </div>
  </div>

  <!-- Scanner UI -->
  <video id="video" autoplay muted playsinline></video>

  <div id="overlay">
    <div id="status-banner">
      <div id="status">Starting…</div>
      <div id="detected-text"></div>
    </div>
    <div id="reticle">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M20 60 L20 20 L60 20"   stroke="white" stroke-width="4" stroke-linecap="round"/>
        <path d="M140 20 L180 20 L180 60" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <path d="M180 140 L180 180 L140 180" stroke="white" stroke-width="4" stroke-linecap="round"/>
        <path d="M60 180 L20 180 L20 140"  stroke="white" stroke-width="4" stroke-linecap="round"/>
        <line x1="97" y1="100" x2="103" y2="100" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
        <line x1="100" y1="97"  x2="100" y2="103" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <span id="count">Scanned Codes (0)</span>
      <button id="copy-btn" disabled>Copy All</button>
    </div>
    <div id="code-list-wrap">
      <p id="empty-msg">No codes scanned yet</p>
      <ul id="code-list"></ul>
    </div>
  </div>

  <script>
    const VERSION = '0.03';

    const video      = document.getElementById('video');
    const statusEl   = document.getElementById('status');
    const detectedEl = document.getElementById('detected-text');
    const codeList   = document.getElementById('code-list');
    const countEl    = document.getElementById('count');
    const copyBtn    = document.getElementById('copy-btn');
    const emptyMsg   = document.getElementById('empty-msg');

    // Map<normalizedCode, { confidence, li, confSpan }>
    const codes = new Map();
    let scanning = false;

    // ── Welcome screen ──────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('welcome').style.display = 'none';
      start();
    });

    // ── Helpers ─────────────────────────────────────────────
    function hammingDistance(a, b) {
      let d = 0;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
      return d;
    }

    function confColor(pct) {
      if (pct >= 80) return '#4ade80';
      if (pct >= 60) return '#facc15';
      return '#f87171';
    }

    // ── Camera + OCR init ────────────────────────────────────
    async function start() {
      statusEl.textContent = 'Loading OCR…';

      let worker;
      try {
        worker = await Tesseract.createWorker('eng');
      } catch (e) {
        statusEl.textContent = 'Failed to load OCR: ' + e.message;
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        await video.play();
      } catch (e) {
        statusEl.textContent = 'Camera error: ' + e.message;
        return;
      }

      statusEl.textContent = 'Ready — point at a 10-character code';
      startScanLoop(worker);
    }

    // ── Scan loop ────────────────────────────────────────────
    function startScanLoop(worker) {
      const canvas  = document.createElement('canvas');
      const ctx     = canvas.getContext('2d');
      const wordRe  = /^[A-Za-z0-9]{10}$/;

      setInterval(async () => {
        if (scanning || video.readyState < 4) return;
        scanning = true;
        statusEl.textContent = 'Scanning…';

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        try {
          const { data } = await worker.recognize(canvas);

          // Show raw detected text as feedback
          const trimmed = (data.text || '').replace(/\s+/g, ' ').trim();
          detectedEl.textContent = trimmed
            ? 'Detected: ' + (trimmed.length > 80 ? trimmed.slice(0, 80) + '…' : trimmed)
            : '';

          // Use word-level results for per-token confidence
          for (const word of (data.words || [])) {
            const raw = word.text.trim();
            if (wordRe.test(raw) && /[A-Za-z]/.test(raw) && /[0-9]/.test(raw)) {
              processCode(raw.toUpperCase(), word.confidence);
            }
          }
        } catch (_) {}

        statusEl.textContent = 'Ready — point at a 10-character code';
        scanning = false;
      }, 1000);
    }

    // ── Confidence-aware dedup ───────────────────────────────
    function processCode(code, confidence) {
      // Exact match: update confidence display if improved
      if (codes.has(code)) {
        const entry = codes.get(code);
        if (confidence > entry.confidence) {
          entry.confidence = confidence;
          entry.confSpan.textContent = Math.round(confidence) + '%';
          entry.confSpan.style.color = confColor(confidence);
        }
        return;
      }

      // Near-duplicate: hamming distance ≤ 1 (one misread character)
      for (const [existing, entry] of codes) {
        if (hammingDistance(code, existing) <= 1) {
          if (confidence > entry.confidence) {
            // Higher-confidence scan wins — replace the old entry
            codes.delete(existing);
            entry.li.remove();
            addCodeToList(code, confidence);
          }
          return;
        }
      }

      // Genuinely new code
      addCodeToList(code, confidence);
    }

    // ── DOM ──────────────────────────────────────────────────
    function addCodeToList(code, confidence) {
      emptyMsg.style.display = 'none';

      const li = document.createElement('li');

      const left = document.createElement('div');
      left.className = 'code-left';

      const codeSpan = document.createElement('span');
      codeSpan.className = 'code-text';
      codeSpan.textContent = code;

      const confSpan = document.createElement('span');
      confSpan.className = 'conf-badge';
      confSpan.textContent = Math.round(confidence) + '%';
      confSpan.style.color = confColor(confidence);

      left.appendChild(codeSpan);
      left.appendChild(confSpan);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '×';
      delBtn.setAttribute('aria-label', 'Remove ' + code);
      delBtn.addEventListener('click', () => {
        codes.delete(code);
        li.remove();
        countEl.textContent = `Scanned Codes (${codes.size})`;
        if (!codes.size) {
          emptyMsg.style.display = '';
          copyBtn.disabled = true;
        }
      });

      li.appendChild(left);
      li.appendChild(delBtn);
      codeList.prepend(li);

      codes.set(code, { confidence, li, confSpan });

      countEl.textContent = `Scanned Codes (${codes.size})`;
      copyBtn.disabled = false;
    }

    copyBtn.addEventListener('click', async () => {
      if (!codes.size) return;
      try {
        await navigator.clipboard.writeText([...codes.keys()].join('\n'));
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy All'; }, 1500);
      } catch (e) {
        copyBtn.textContent = 'Failed';
        setTimeout(() => { copyBtn.textContent = 'Copy All'; }, 1500);
      }
    });
  </script>
</body>
</html>

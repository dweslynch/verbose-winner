<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Code Scanner</title>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0f172a;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ── Welcome screen ───────────────────────────────────── */
    #welcome {
      position: fixed;
      inset: 0;
      z-index: 20;
      background: #0a0f1e;
      background-image:
        radial-gradient(ellipse at 20% 50%, rgba(37, 99, 235, 0.14) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 15%, rgba(124, 58, 237, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 60% 90%, rgba(16, 185, 129, 0.06) 0%, transparent 45%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      padding-top: max(32px, env(safe-area-inset-top));
      padding-bottom: max(32px, env(safe-area-inset-bottom));
    }

    #welcome-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 320px;
      width: 100%;
      text-align: center;
      padding: 36px 28px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 28px;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }

    #welcome-icon {
      width: 76px;
      height: 76px;
      background: linear-gradient(135deg, rgba(37, 99, 235, 0.25), rgba(124, 58, 237, 0.2));
      border-radius: 22px;
      border: 1px solid rgba(96, 165, 250, 0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(96, 165, 250, 0), 0 0 20px rgba(96, 165, 250, 0.15); }
      50%       { box-shadow: 0 0 0 10px rgba(96, 165, 250, 0), 0 0 40px rgba(96, 165, 250, 0.3); }
    }

    #welcome-card h1 {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #f1f5f9 0%, #94a3b8 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .version-badge {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: rgba(255, 255, 255, 0.35);
      font-size: 11px;
      font-family: 'Courier New', monospace;
      padding: 3px 10px;
      border-radius: 20px;
      margin-top: -8px;
      letter-spacing: 0.05em;
    }

    #welcome-card p {
      font-size: 15px;
      color: rgba(255, 255, 255, 0.45);
      line-height: 1.6;
    }

    #start-btn {
      margin-top: 8px;
      width: 100%;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      box-shadow: 0 4px 24px rgba(37, 99, 235, 0.45);
      color: #fff;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.02em;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.15s;
    }
    #start-btn:active {
      background: linear-gradient(135deg, #1d4ed8 0%, #6d28d9 100%);
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.3);
    }

    /* ── Scanner UI ───────────────────────────────────────── */
    #video {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: 0;
    }

    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #status-banner {
      width: 100%;
      background: linear-gradient(180deg, rgba(0,0,0,0.78) 0%, rgba(0,0,0,0.5) 100%);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      color: #fff;
      padding: 12px 16px 10px;
      padding-top: max(12px, env(safe-area-inset-top));
    }

    #status {
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    #detected-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.4);
      margin-top: 5px;
      min-height: 16px;
      word-break: break-all;
      font-family: 'Courier New', monospace;
    }

    #reticle {
      position: relative;
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #reticle svg {
      width: min(65vw, 65vh);
      height: min(65vw, 65vh);
      filter: drop-shadow(0 0 6px rgba(96, 165, 250, 0.5));
    }

    #scan-line {
      position: absolute;
      width: min(65vw, 65vh);
      height: 2px;
      background: linear-gradient(90deg, transparent 0%, #60a5fa 30%, #a78bfa 50%, #60a5fa 70%, transparent 100%);
      filter: blur(1px);
      box-shadow: 0 0 10px rgba(96, 165, 250, 0.7);
      animation: scanLine 2.5s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes scanLine {
      0%   { transform: translateY(calc(-0.5 * min(65vw, 65vh))); opacity: 0; }
      8%   { opacity: 0.85; }
      92%  { opacity: 0.85; }
      100% { transform: translateY(calc(0.5 * min(65vw, 65vh))); opacity: 0; }
    }

    /* ── Bottom panel ─────────────────────────────────────── */
    #panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      background: rgba(5, 8, 22, 0.93);
      border-top: 1px solid rgba(96, 165, 250, 0.18);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      color: #fff;
      max-height: 45vh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom);
    }

    #panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 14px;
      background: rgba(255, 255, 255, 0.025);
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      flex-shrink: 0;
    }

    #count {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
    }

    #copy-btn {
      background: linear-gradient(135deg, #2563eb, #4f46e5);
      box-shadow: 0 2px 10px rgba(37, 99, 235, 0.4);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 7px 16px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow 0.15s;
    }
    #copy-btn:active {
      background: linear-gradient(135deg, #1d4ed8, #4338ca);
      box-shadow: none;
    }
    #copy-btn:disabled {
      background: rgba(255, 255, 255, 0.08);
      box-shadow: none;
      color: rgba(255, 255, 255, 0.25);
      cursor: default;
    }

    #code-list-wrap {
      overflow-y: auto;
      flex: 1;
      -webkit-overflow-scrolling: touch;
    }

    #code-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    #code-list li {
      padding: 10px 14px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      color: #cbd5e1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    #code-list li:first-child {
      background: rgba(96, 165, 250, 0.07);
      border-left: 3px solid rgba(96, 165, 250, 0.55);
    }

    #code-list li:first-child .code-text { color: #93c5fd; }

    .code-left {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .code-text {
      font-family: 'Courier New', Courier, monospace;
      font-size: 15px;
      letter-spacing: 0.08em;
    }

    .conf-badge {
      font-size: 10px;
      font-family: 'Courier New', monospace;
      padding: 2px 7px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      flex-shrink: 0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.2);
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      padding: 0 0 0 4px;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .delete-btn:active { color: #f87171; }

    #empty-msg {
      padding: 16px;
      font-size: 13px;
      color: rgba(255, 255, 255, 0.25);
      text-align: center;
      letter-spacing: 0.01em;
    }
  </style>
</head>
<body>

  <!-- Welcome screen -->
  <div id="welcome">
    <div id="welcome-card">
      <div id="welcome-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
          <circle cx="12" cy="13" r="4"/>
        </svg>
      </div>
      <h1>Code Scanner</h1>
      <span class="version-badge">v0.05</span>
      <p>Point your camera at text containing a 10-character alphanumeric code. Codes are captured automatically.</p>
      <button id="start-btn">Start Scanning</button>
    </div>
  </div>

  <!-- Scanner UI -->
  <video id="video" autoplay muted playsinline></video>

  <div id="overlay">
    <div id="status-banner">
      <div id="status">Starting…</div>
      <div id="detected-text"></div>
    </div>
    <div id="reticle">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="bracket-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <g filter="url(#bracket-glow)">
          <path d="M20 60 L20 20 L60 20"      stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M140 20 L180 20 L180 60"   stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M180 140 L180 180 L140 180" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M60 180 L20 180 L20 140"   stroke="white" stroke-width="3.5" stroke-linecap="round"/>
        </g>
        <line x1="97" y1="100" x2="103" y2="100" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
        <line x1="100" y1="97"  x2="100" y2="103" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-linecap="round"/>
      </svg>
      <div id="scan-line"></div>
    </div>
  </div>

  <div id="panel">
    <div id="panel-header">
      <span id="count">Scanned Codes (0)</span>
      <button id="copy-btn" disabled>Copy All</button>
    </div>
    <div id="code-list-wrap">
      <p id="empty-msg">No codes scanned yet</p>
      <ul id="code-list"></ul>
    </div>
  </div>

  <script>
    const VERSION = '0.05';

    const video      = document.getElementById('video');
    const statusEl   = document.getElementById('status');
    const detectedEl = document.getElementById('detected-text');
    const codeList   = document.getElementById('code-list');
    const countEl    = document.getElementById('count');
    const copyBtn    = document.getElementById('copy-btn');
    const emptyMsg   = document.getElementById('empty-msg');

    // Map<normalizedCode, { confidence, li, confSpan }>
    const codes = new Map();
    let scanning = false;

    // ── Welcome screen ──────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', () => {
      document.getElementById('welcome').style.display = 'none';
      start();
    });

    // ── Helpers ─────────────────────────────────────────────
    function hammingDistance(a, b) {
      let d = 0;
      for (let i = 0; i < a.length; i++) if (a[i] !== b[i]) d++;
      return d;
    }

    function confColor(pct) {
      if (pct >= 80) return '#4ade80';
      if (pct >= 60) return '#facc15';
      return '#f87171';
    }

    // ── Camera + OCR init ────────────────────────────────────
    async function start() {
      statusEl.textContent = 'Loading OCR…';

      let worker;
      try {
        worker = await Tesseract.createWorker('eng');
      } catch (e) {
        statusEl.textContent = 'Failed to load OCR: ' + e.message;
        return;
      }

      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'environment', width: { ideal: 1280 } }
        });
        video.srcObject = stream;
        await video.play();
      } catch (e) {
        statusEl.textContent = 'Camera error: ' + e.message;
        return;
      }

      statusEl.textContent = 'Ready — point at a 10-character code';
      startScanLoop(worker);
    }

    // ── Scan loop ────────────────────────────────────────────
    function startScanLoop(worker) {
      const canvas = document.createElement('canvas');
      const ctx    = canvas.getContext('2d');
      const codeRe = /\b[A-Za-z0-9]{10}\b/g;

      setInterval(async () => {
        if (scanning || video.readyState < 4) return;
        scanning = true;
        statusEl.textContent = 'Scanning…';

        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);

        try {
          const { data } = await worker.recognize(canvas);

          // Show raw detected text as feedback
          const trimmed = (data.text || '').replace(/\s+/g, ' ').trim();
          detectedEl.textContent = trimmed
            ? 'Detected: ' + (trimmed.length > 80 ? trimmed.slice(0, 80) + '…' : trimmed)
            : '';

          // Build per-word confidence lookup (fallback)
          const wordConf = new Map();
          for (const word of (data.words || [])) {
            const t = word.text.trim().toUpperCase();
            if (t) wordConf.set(t, word.confidence);
          }

          // Build symbol-level confidence lookup: join all symbols into a
          // string, find each matched code's position, average char confidences
          const symbols    = data.symbols || [];
          const symbolText = symbols.map(s => s.text).join('');
          const symbolTextUp = symbolText.toUpperCase();

          function symbolConfFor(code) {
            const idx = symbolTextUp.indexOf(code.toUpperCase());
            if (idx < 0) return null;
            const slice = symbols.slice(idx, idx + code.length);
            return slice.reduce((sum, s) => sum + s.confidence, 0) / slice.length;
          }

          // Match against full text for maximum recall — word tokenizer can
          // miss codes that have punctuation attached or unusual spacing
          const matches = [...new Set((data.text || '').match(codeRe) || [])];
          for (const raw of matches) {
            if (/[A-Za-z]/.test(raw) && /[0-9]/.test(raw)) {
              const confidence = symbolConfFor(raw)
                ?? wordConf.get(raw.toUpperCase())
                ?? data.confidence
                ?? 50;
              processCode(raw, confidence);
            }
          }
        } catch (_) {}

        statusEl.textContent = 'Ready — point at a 10-character code';
        scanning = false;
      }, 1000);
    }

    // ── Confidence-aware dedup ───────────────────────────────
    // Map is keyed by uppercase for case-insensitive dedup;
    // original case is preserved in entry.display for rendering.
    function processCode(raw, confidence) {
      const key = raw.toUpperCase();

      // Exact match: update confidence + display if improved
      if (codes.has(key)) {
        const entry = codes.get(key);
        if (confidence > entry.confidence) {
          entry.confidence = confidence;
          entry.display    = raw;
          entry.codeSpan.textContent = raw;
          entry.confSpan.textContent = Math.round(confidence) + '%';
          entry.confSpan.style.color = confColor(confidence);
        }
        return;
      }

      // Near-duplicate: hamming distance ≤ 1 on normalized keys
      for (const [existingKey, entry] of codes) {
        if (hammingDistance(key, existingKey) <= 1) {
          if (confidence > entry.confidence) {
            codes.delete(existingKey);
            entry.li.remove();
            addCodeToList(raw, confidence);
          }
          return;
        }
      }

      // Genuinely new code
      addCodeToList(raw, confidence);
    }

    // ── DOM ──────────────────────────────────────────────────
    function addCodeToList(raw, confidence) {
      const key = raw.toUpperCase();
      emptyMsg.style.display = 'none';

      const li = document.createElement('li');

      const left = document.createElement('div');
      left.className = 'code-left';

      const codeSpan = document.createElement('span');
      codeSpan.className = 'code-text';
      codeSpan.textContent = raw;

      const confSpan = document.createElement('span');
      confSpan.className = 'conf-badge';
      confSpan.textContent = Math.round(confidence) + '%';
      confSpan.style.color = confColor(confidence);

      left.appendChild(codeSpan);
      left.appendChild(confSpan);

      const delBtn = document.createElement('button');
      delBtn.className = 'delete-btn';
      delBtn.textContent = '×';
      delBtn.setAttribute('aria-label', 'Remove ' + raw);
      delBtn.addEventListener('click', () => {
        codes.delete(key);
        li.remove();
        countEl.textContent = `Scanned Codes (${codes.size})`;
        if (!codes.size) {
          emptyMsg.style.display = '';
          copyBtn.disabled = true;
        }
      });

      li.appendChild(left);
      li.appendChild(delBtn);
      codeList.prepend(li);

      codes.set(key, { confidence, display: raw, li, codeSpan, confSpan });

      countEl.textContent = `Scanned Codes (${codes.size})`;
      copyBtn.disabled = false;
    }

    copyBtn.addEventListener('click', async () => {
      if (!codes.size) return;
      try {
        await navigator.clipboard.writeText([...codes.keys()].join('\n'));
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = 'Copy All'; }, 1500);
      } catch (e) {
        copyBtn.textContent = 'Failed';
        setTimeout(() => { copyBtn.textContent = 'Copy All'; }, 1500);
      }
    });
  </script>
</body>
</html>
